name: Daily MLB Report Generator

on:
  schedule:
    # 04:00 UTC is 12:00 PM Taipei Time (UTC+8)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  run-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Daily Report
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python fetch_mlb.py --check-wait

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update daily report for $(date +'%Y-%m-%d')" && git push)
